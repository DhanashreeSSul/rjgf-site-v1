<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Amazing Team</title>
  <link rel="stylesheet" href="team.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Z6V2VuVjs6KBg/dK/yQ4DoSpF7vZTw+zKb4VQd6dI+u5ehH7ghYZU/1J07xS7KJTOyXoXIBQW1Lf1LrDkYBE8A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <section class="team-section">
    <h1>Our Amazing Team</h1>
    <div class="team-container">
      <!-- Top Row -->
      <div class="team-row top-row">
        <div class="member-card">
          <img src="https://via.placeholder.com/100" alt="Nat Reynolds" />
          <h3>NAT REYNOLDS</h3>
          <p class="role">Worldwide Partner</p>
          <div class="socials">
            <i class="fab fa-facebook"></i>
            <i class="fab fa-twitter"></i>
            <i class="fab fa-instagram"></i>
          </div>
        </div>
        <div class="member-card">
          <img src="https://via.placeholder.com/100" alt="Jennie Roberts" />
          <h3>JENNIE ROBERTS</h3>
          <p class="role">Partner</p>
          <div class="socials">
            <i class="fab fa-facebook"></i>
            <i class="fab fa-twitter"></i>
            <i class="fab fa-instagram"></i>
          </div>
        </div>
        <div class="member-card">
          <img src="https://via.placeholder.com/100" alt="Ann Richmond" />
          <h3>ANN RICHMOND</h3>
          <p class="role">Partner</p>
          <div class="socials">
            <i class="fab fa-facebook"></i>
            <i class="fab fa-twitter"></i>
            <i class="fab fa-instagram"></i>
          </div>
        </div>
        <div class="member-card">
          <img src="https://via.placeholder.com/100" alt="James Oliver" />
          <h3>JAMES OLIVER</h3>
          <p class="role">Associate Partner</p>
          <div class="socials">
            <i class="fab fa-facebook"></i>
            <i class="fab fa-twitter"></i>
            <i class="fab fa-instagram"></i>
          </div>
        </div>
      </div>

      <!-- Bottom Row -->
      <div class="team-row bottom-row">
        <div class="member-card">
          <img src="https://via.placeholder.com/100" alt="Monica Pouli" />
          <h3>MONICA POULI</h3>
          <p class="role">Creative Leader</p>
          <div class="socials">
            <i class="fab fa-facebook"></i>
            <i class="fab fa-instagram"></i>
          </div>
        </div>
        <div class="member-card">
          <img src="https://via.placeholder.com/100" alt="Walter Lilly" />
          <h3>WALTER LILLY</h3>
          <p class="role">Marketing Manager</p>
          <div class="socials">
            <i class="fab fa-facebook"></i>
            <i class="fab fa-twitter"></i>
            <i class="fab fa-instagram"></i>
          </div>
        </div>
        <div class="member-card">
          <img src="https://via.placeholder.com/100" alt="Bob Wilson" />
          <h3>BOB WILSON</h3>
          <p class="role">Territory Manager</p>
          <div class="socials">
            <i class="fab fa-facebook"></i>
            <i class="fab fa-twitter"></i>
            <i class="fab fa-instagram"></i>
          </div>
        </div>
        <div class="member-card">
          <img src="https://via.placeholder.com/100" alt="Mila Carvalho" />
          <h3>MILA CARVALHO</h3>
          <p class="role">Human Resources Manager</p>
          <div class="socials">
            <i class="fab fa-facebook"></i>
            <i class="fab fa-instagram"></i>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
